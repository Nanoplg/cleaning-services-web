name: Temporary Cleaning Lab navigation fix

on:
  push:
    branches:
      - codex/cleaning-lab-direct-page

permissions:
  contents: write

jobs:
  apply-fix:
    if: ${{ !contains(github.event.head_commit.message, '[nav-fix-done]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/cleaning-lab-direct-page
          fetch-depth: 0

      - name: Correct Cleaning Lab navigation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          old_desktop = '        <a href="#sistema">Nuestro sistema</a>'
          new_desktop = '        <a href="guia-materiales.html">Cleaning Lab</a>'
          old_mobile = '    <a href="#sistema">Nuestro sistema</a>\n    <a href="#lab">Cleaning Lab</a>'
          new_mobile = '    <a href="guia-materiales.html">Cleaning Lab</a>'

          if old_desktop not in html:
              raise SystemExit('No se encontró el enlace de escritorio esperado en index.html')
          if old_mobile not in html:
              raise SystemExit('No se encontró el bloque móvil esperado en index.html')

          html = html.replace(old_desktop, new_desktop, 1)
          html = html.replace(old_mobile, new_mobile, 1)
          index.write_text(html, encoding='utf-8')

          channel = Path('channel.js')
          js = channel.read_text(encoding='utf-8')
          start = js.index("  const addCleaningLabLink =")
          end = js.index("\n\n  const closeMenu", start)
          replacement = '''  const hasCleaningLabLink = nav => {
            if (!nav) return false;

            return Array.from(nav.querySelectorAll('a')).some(link => {
              const href = (link.getAttribute('href') || '').replace(/^\.\//, '');
              return href === 'guia-materiales.html'
                || href === 'index.html#lab'
                || href === '#lab'
                || link.hasAttribute('data-cleaning-lab-nav');
            });
          };

          const addCleaningLabLink = (nav, beforeElement = null) => {
            if (!nav || hasCleaningLabLink(nav)) return;

            const link = document.createElement('a');
            link.href = 'guia-materiales.html';
            link.textContent = 'Cleaning Lab';
            link.setAttribute('data-cleaning-lab-nav', 'true');
            nav.insertBefore(link, beforeElement);
          };

          addCleaningLabLink(desktopNav, desktopNav?.querySelector('.nav-cta') || null);

          const firstSectionLink = mobileNav
            ? Array.from(mobileNav.querySelectorAll('a')).find(link => link.getAttribute('href')?.startsWith('#'))
            : null;
          addCleaningLabLink(mobileNav, firstSectionLink || null);'''
          js = js[:start] + replacement + js[end:]
          channel.write_text(js, encoding='utf-8')

          Path('navigation-cleaning-lab.css').write_text(
              '/* La navegación de Cleaning Lab ahora está integrada directamente en el HTML y channel.js. */\n',
              encoding='utf-8'
          )
          PY

      - name: Commit corrected navigation
        shell: bash
        run: |
          git config user.name "Nanoplg"
          git config user.email "mariano.miletti85@gmail.com"
          git add index.html channel.js navigation-cleaning-lab.css
          git commit -m "Corregir acceso directo y duplicado de Cleaning Lab [nav-fix-done]"
          git push origin HEAD:codex/cleaning-lab-direct-page
